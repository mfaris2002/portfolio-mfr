name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd portfolio-mfr
            git pull origin main
            docker build -t portfolio-mfr .
            docker rm -f portfolio-mfr 2>/dev/null || true
            docker run -d -p 3000:3000 --name portfolio-mfr portfolio-mfr
